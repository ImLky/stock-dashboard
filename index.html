<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식 모니터링 대시보드</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--sub:#64748b;--accent:#38bdf8;--up:#ef4444;--dn:#3b82f6;--font:'Pretendard',-apple-system,sans-serif}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;height:100vh;overflow:hidden}

    /* Loading Overlay */
    .overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
    .overlay.hide{opacity:0;pointer-events:none}
    .spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .overlay p{margin-top:16px;font-size:14px;color:var(--sub)}
    .overlay .progress{width:200px;height:4px;background:var(--border);border-radius:2px;margin-top:12px;overflow:hidden}
    .overlay .bar{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;width:0}

    .hdr{background:var(--card);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .hdr h1{font-size:16px;font-weight:800;color:var(--accent)}
    .hdr span{font-size:11px;color:var(--sub)}

    .wrap{display:grid;grid-template-columns:1fr 280px;grid-template-rows:auto 1fr auto;gap:8px;padding:8px;height:calc(100vh - 38px);overflow:hidden}

    .cards{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .cd{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
    .cd__l{font-size:10px;color:var(--sub)}.cd__v{font-size:16px;font-weight:800}.cd__c{font-size:10px;margin-top:1px}
    .up{color:var(--up)}.dn{color:var(--dn)}.fl{color:var(--sub)}

    .left{display:flex;flex-direction:column;gap:8px;overflow:hidden}
    .sec{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
    .sec--grow{flex:1;min-height:0}
    .sh{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .sh__t{font-size:12px;font-weight:700}.sh__s{font-size:10px;color:var(--sub)}
    .tabs{display:flex;gap:3px}
    .tab{background:var(--bg);border:1px solid var(--border);color:var(--sub);padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer;font-family:var(--font)}
    .tab:hover,.tab.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
    .chart-body{flex:1;min-height:0;position:relative}
    .chart-body canvas{width:100%!important;height:100%!important}
    .chart-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--sub);font-size:12px;background:rgba(30,41,59,.85);z-index:5;gap:8px;border-radius:0 0 8px 8px}
    .chart-loading .mini-spin{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

    .hm-sec{flex-shrink:0}
    .hmap{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;padding:6px 8px}
    .hm{padding:5px 2px;border-radius:4px;text-align:center;cursor:pointer;transition:.2s}
    .hm:hover{opacity:.8}
    .hm__n{font-size:8px;font-weight:600}.hm__v{font-size:10px;font-weight:800}
    .hmu1{background:rgba(239,68,68,.2);color:var(--up)}.hmu2{background:rgba(239,68,68,.35);color:var(--up)}.hmu3{background:rgba(239,68,68,.5);color:#fff}
    .hmd1{background:rgba(59,130,246,.2);color:var(--dn)}.hmd2{background:rgba(59,130,246,.35);color:var(--dn)}.hmd3{background:rgba(59,130,246,.5);color:#fff}
    .hmf{background:rgba(100,116,139,.15);color:var(--sub)}

    .right{display:flex;flex-direction:column;gap:8px;overflow:hidden}
    .tbl-wrap{flex:1;min-height:0;overflow-y:auto}
    .tbl{width:100%;border-collapse:collapse;font-size:11px}
    .tbl th{padding:5px 8px;text-align:left;color:var(--sub);font-weight:600;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);font-size:10px}
    .tbl td{padding:4px 8px;border-bottom:1px solid rgba(51,65,85,.3)}
    .tbl tr:hover{background:rgba(56,189,248,.05)}
    .tbl .nm{font-weight:600;cursor:pointer}.tbl .nm:hover{color:var(--accent)}
    .tbl .r{text-align:right}
    .sbox{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:4px;font-size:10px;width:90px;font-family:var(--font)}

    .news-wrap{flex-shrink:0;max-height:160px}
    .news-scroll{overflow-y:auto;max-height:120px}
    .ni{padding:5px 8px;border-bottom:1px solid rgba(51,65,85,.3)}
    .ni:hover{background:rgba(56,189,248,.05)}
    .ni__t{font-size:11px;font-weight:600;line-height:1.3}.ni__m{font-size:9px;color:var(--sub)}

    .ft{grid-column:1/-1;text-align:center;font-size:9px;color:var(--sub);padding:4px}

    @media(max-width:768px){body{overflow:auto;height:auto}.wrap{grid-template-columns:1fr;height:auto;overflow:auto}.cards{grid-template-columns:repeat(2,1fr)}.hmap{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>

<!-- Loading Overlay -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p id="loadMsg">데이터를 불러오는 중입니다...</p>
  <div class="progress"><div class="bar" id="loadBar"></div></div>
</div>

<header class="hdr"><h1>📊 StockDash</h1><span id="clock"></span></header>

<div class="wrap">
  <div class="cards">
    <div class="cd"><div class="cd__l">코스피</div><div class="cd__v" id="v_kospi">-</div><div class="cd__c fl" id="c_kospi">-</div></div>
    <div class="cd"><div class="cd__l">코스닥</div><div class="cd__v" id="v_kosdaq">-</div><div class="cd__c fl" id="c_kosdaq">-</div></div>
    <div class="cd"><div class="cd__l">원/달러</div><div class="cd__v" id="v_usdkrw">-</div><div class="cd__c fl" id="c_usdkrw">-</div></div>
    <div class="cd"><div class="cd__l">비트코인</div><div class="cd__v" id="v_btc">-</div><div class="cd__c fl" id="c_btc">-</div></div>
  </div>

  <div class="left">
    <div class="sec sec--grow">
      <div class="sh"><div><span class="sh__t" id="cTitle">삼성전자</span> <span class="sh__s" id="cSub"></span></div><div class="tabs" id="tabs"></div></div>
      <div class="chart-body"><canvas id="chart"></canvas><div class="chart-loading" id="cLoad" style="display:none"><div class="mini-spin"></div><span>차트 로딩중...</span></div></div>
    </div>
    <div class="sec hm-sec">
      <div class="sh"><span class="sh__t">등락률</span></div>
      <div class="hmap" id="hmap"></div>
    </div>
  </div>

  <div class="right">
    <div class="sec sec--grow">
      <div class="sh"><span class="sh__t">종목</span><input class="sbox" id="search" placeholder="검색..." oninput="renderTbl()"></div>
      <div class="tbl-wrap">
        <table class="tbl"><thead><tr><th>종목</th><th class="r">현재가</th><th class="r">등락</th></tr></thead><tbody id="tbody"></tbody></table>
      </div>
    </div>
    <div class="sec news-wrap">
      <div class="sh"><span class="sh__t">뉴스</span></div>
      <div class="news-scroll" id="news"></div>
    </div>
  </div>

  <div class="ft">포트폴리오 목적 구현 | 데이터: Yahoo Finance | 투자 판단 용도 아님</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
Chart.defaults.color='#64748b';Chart.defaults.borderColor='#334155';

/* === Loading === */
var loadTotal=0,loadDone=0;
function loadProgress(){loadDone++;var pct=Math.round(loadDone/loadTotal*100);document.getElementById('loadBar').style.width=pct+'%';document.getElementById('loadMsg').textContent='데이터 로딩중... ('+loadDone+'/'+loadTotal+')';if(loadDone>=loadTotal)setTimeout(function(){document.getElementById('overlay').classList.add('hide')},300)}

/* === CORS Proxy === */
function pFetch(url){
  return fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url))
    .then(function(r){if(!r.ok)throw'e';return r.json()})
    .catch(function(){return fetch('https://corsproxy.io/?'+encodeURIComponent(url)).then(function(r){return r.json()})});
}

/* === Yahoo === */
function yf(sym,range,itv){
  range=range||'6mo';itv=itv||'1d';
  var ck='yf_'+sym+'_'+range,c=sessionStorage.getItem(ck);
  if(c){var cd=JSON.parse(c);if(Date.now()-cd.t<600000){loadProgress();return Promise.resolve(cd.d)}}
  return pFetch('https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?range='+range+'&interval='+itv+'&includePrePost=false')
    .then(function(j){
      var r=j.chart.result[0],ts=r.timestamp||[],q=r.indicators.quote[0],m=r.meta;
      var o={dates:[],closes:[],price:m.regularMarketPrice,prev:m.previousClose||m.chartPreviousClose};
      for(var i=0;i<ts.length;i++){if(!q.close[i])continue;o.dates.push(new Date(ts[i]*1000).toISOString().split('T')[0]);o.closes.push(q.close[i])}
      sessionStorage.setItem(ck,JSON.stringify({t:Date.now(),d:o}));loadProgress();return o;
    }).catch(function(){loadProgress();return null});
}

/* === Clock === */
setInterval(function(){var d=new Date();document.getElementById('clock').textContent=d.toLocaleDateString('ko')+' '+d.toLocaleTimeString('ko')},1000);

/* === Data === */
var IDX=[{id:'kospi',s:'^KS11'},{id:'kosdaq',s:'^KQ11'},{id:'usdkrw',s:'KRW=X'},{id:'btc',s:'BTC-USD'}];
var ST=[
  {s:'005930.KS',n:'삼성전자'},{s:'000660.KS',n:'SK하이닉스'},{s:'373220.KS',n:'LG에너지솔루션'},
  {s:'006400.KS',n:'삼성SDI'},{s:'035420.KS',n:'NAVER'},{s:'035720.KS',n:'카카오'},
  {s:'005380.KS',n:'현대차'},{s:'000270.KS',n:'기아'},{s:'068270.KS',n:'셀트리온'},
  {s:'051910.KS',n:'LG화학'},{s:'207940.KS',n:'삼성바이오'},{s:'017670.KS',n:'SK텔레콤'}
];
var sd={};

/* Load All Data in Parallel */
loadTotal=IDX.length+ST.length+1; /* +1 for main chart */

/* Index Cards */
IDX.forEach(function(x){
  yf(x.s,'5d','1d').then(function(d){
    if(!d)return;
    var p=d.price||d.closes[d.closes.length-1],pv=d.prev||d.closes[d.closes.length-2]||p;
    var ch=p-pv,pc=ch/pv*100,cl=ch>=0?'up':'dn',sg=ch>=0?'▲ +':'▼ ';
    document.getElementById('v_'+x.id).textContent=p>=10000?Math.round(p).toLocaleString():p.toFixed(2);
    var el=document.getElementById('c_'+x.id);el.className='cd__c '+cl;el.textContent=sg+Math.abs(ch).toFixed(2)+' ('+Math.abs(pc).toFixed(2)+'%)';
  });
});

/* Stock Data */
ST.forEach(function(s){
  yf(s.s,'5d','1d').then(function(d){
    if(!d){sd[s.s]={p:0,c:0};return}
    var p=d.price||d.closes[d.closes.length-1],pv=d.prev||d.closes[d.closes.length-2]||p;
    sd[s.s]={p:p,c:(p-pv)/pv*100};
    renderTbl();renderHm();
  });
});

/* === Tabs === */
var tabsEl=document.getElementById('tabs');
ST.slice(0,4).forEach(function(s,i){
  var b=document.createElement('button');b.className='tab'+(i===0?' on':'');b.textContent=s.n;
  b.onclick=function(){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});b.classList.add('on');loadChart(s.s,s.n)};
  tabsEl.appendChild(b);
});

/* === Chart === */
var ci=null;
function loadChart(sym,name){
  document.getElementById('cTitle').textContent=name;
  var cl=document.getElementById('cLoad');cl.style.display='flex';cl.innerHTML='<div class="mini-spin"></div><span>'+name+' 차트 로딩중...</span>';
  yf(sym,'6mo','1d').then(function(d){
    cl.style.display='none';
    if(!d){cl.style.display='flex';cl.innerHTML='<span>데이터를 불러올 수 없습니다</span>';return}
    document.getElementById('cSub').textContent=d.closes.length+'일';
    if(ci)ci.destroy();
    ci=new Chart(document.getElementById('chart'),{
      type:'line',
      data:{labels:d.dates,datasets:[{label:name,data:d.closes,borderColor:'#38bdf8',backgroundColor:'rgba(56,189,248,0.08)',fill:true,tension:0.3,pointRadius:0,borderWidth:1.5}]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:500},
        plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:function(c){return c.dataset.label+': '+Math.round(c.parsed.y).toLocaleString()+'원'}}}},
        scales:{x:{grid:{display:false},ticks:{maxTicksLimit:6,font:{size:9}}},y:{position:'right',grid:{color:'rgba(51,65,85,.4)'},ticks:{callback:function(v){return v>=10000?(v/10000).toFixed(1)+'만':v.toLocaleString()},font:{size:9}}}}}
    });
  });
}
loadChart('005930.KS','삼성전자');

/* === Table === */
function renderTbl(){
  var q=(document.getElementById('search').value||'').toLowerCase(),h='';
  ST.forEach(function(s){
    if(q&&s.n.toLowerCase().indexOf(q)<0)return;
    var d=sd[s.s];if(!d)return;
    var cl=d.c>=0?'up':'dn',sg=d.c>=0?'+':'';
    h+='<tr><td class="nm" onclick="loadChart(\''+s.s+'\',\''+s.n+'\')">'+s.n+'</td><td class="r">'+Math.round(d.p).toLocaleString()+'</td><td class="r '+cl+'">'+sg+d.c.toFixed(1)+'%</td></tr>';
  });
  document.getElementById('tbody').innerHTML=h||'<tr><td colspan="3" style="text-align:center;color:var(--sub);padding:12px">로딩중...</td></tr>';
}

/* === Heatmap === */
function renderHm(){
  var h='';
  ST.forEach(function(s){
    var d=sd[s.s];if(!d)return;
    var c=d.c,cl;
    if(c>=2)cl='hmu3';else if(c>=1)cl='hmu2';else if(c>0)cl='hmu1';
    else if(c<=-2)cl='hmd3';else if(c<=-1)cl='hmd2';else if(c<0)cl='hmd1';else cl='hmf';
    h+='<div class="hm '+cl+'" onclick="loadChart(\''+s.s+'\',\''+s.n+'\')"><div class="hm__n">'+s.n+'</div><div class="hm__v">'+(c>=0?'+':'')+c.toFixed(1)+'%</div></div>';
  });
  document.getElementById('hmap').innerHTML=h||'';
}

/* === News === */
document.getElementById('news').innerHTML=[
  {t:'삼성전자 AI 반도체 수요 급증에 실적 기대',s:'한국경제',m:'10분 전'},
  {t:'SK하이닉스 HBM3E 양산 본격화',s:'매일경제',m:'25분 전'},
  {t:'코스피 외국인 순매수 지속',s:'조선비즈',m:'42분 전'},
  {t:'LG에너지솔루션 북미 공장 증설',s:'머니투데이',m:'1시간 전'},
  {t:'NAVER 하이퍼클로바X 출시',s:'ZDNet',m:'1시간 전'},
].map(function(n){return'<div class="ni"><div class="ni__t">'+n.t+'</div><div class="ni__m">'+n.s+' · '+n.m+'</div></div>'}).join('');
</script>
</body>
</html>
